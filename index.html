<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ChemEdu | Acid Bases ChemEdu - Kelompok 8</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 50%, #d9f99d 100%); background-attachment: fixed; }

    /* ===== AUTH OVERLAY ===== */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #6d28d9 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    #auth-overlay.hidden { display: none; }
    .auth-card {
      background: rgba(255,255,255,0.97);
      border-radius: 2rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      width: 100%; max-width: 440px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4);
    }
    .auth-tab {
      display: flex; border-radius: 1rem; background: #f1f5f9;
      padding: 4px; margin-bottom: 1.5rem; gap: 4px;
    }
    .auth-tab-btn {
      flex: 1; padding: 10px; border-radius: 12px; font-size: 14px;
      font-weight: 600; border: none; cursor: pointer; transition: all 0.25s;
      background: transparent; color: #64748b;
    }
    .auth-tab-btn.active {
      background: white; color: #7c3aed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .auth-input {
      width: 100%; padding: 12px 16px;
      border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 14px; transition: border-color 0.2s;
      font-family: 'Inter', sans-serif;
      margin-bottom: 12px; display: block;
    }
    .auth-input:focus { outline: none; border-color: #8b5cf6; }
    .auth-input-group { position: relative; margin-bottom: 12px; }
    .auth-input-group .auth-input { margin-bottom: 0; }
    .auth-input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: #94a3b8; pointer-events: none;
    }
    .auth-input-group .auth-input { padding-left: 40px; }
    .auth-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; font-family: 'Inter', sans-serif;
      margin-top: 6px;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,58,237,0.4); }
    .auth-btn:active { transform: translateY(0); }
    .auth-error {
      background: #fef2f2; border: 1px solid #fca5a5;
      color: #b91c1c; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 12px; display: none;
    }
    .auth-success {
      background: #f0fdf4; border: 1px solid #86efac;
      color: #15803d; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 12px; display: none;
    }
    .auth-divider { text-align: center; color: #94a3b8; font-size: 12px; margin: 16px 0 12px; position: relative; }
    .auth-divider::before, .auth-divider::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px;
      background: #e2e8f0;
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .role-picker { display: flex; gap: 8px; margin-bottom: 14px; }
    .role-option {
      flex: 1; padding: 10px 8px; border: 2px solid #e2e8f0;
      border-radius: 12px; text-align: center; cursor: pointer;
      transition: all 0.2s; font-size: 13px;
    }
    .role-option:hover { border-color: #8b5cf6; }
    .role-option.selected { border-color: #8b5cf6; background: #f3e8ff; }
    .role-option .role-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
    .auth-hint { background: #faf5ff; border-radius: 10px; padding: 10px 12px; font-size: 11px; color: #6b7280; margin-top: 14px; }
    .auth-hint strong { color: #7c3aed; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: #94a3b8; background: none; border: none; padding: 2px;
    }
    .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* ===== MAIN APP LAYOUT ===== */
    .sidebar {
      background: linear-gradient(145deg, #1e1b4b 0%, #2e1065 100%);
      transition: width 0.2s ease;
      box-shadow: 4px 0 25px rgba(0,0,0,0.2);
      overflow-y: auto; overflow-x: visible;
      position: relative; width: 280px; min-width: 70px; max-width: 400px;
    }
    .sidebar.collapsed { width: 70px !important; min-width: 70px !important; }
    .sidebar.collapsed .sidebar-item span,
    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .user-info-text { display: none; }
    .sidebar.collapsed .sidebar-item { justify-content: center; gap: 0; padding: 12px 0; margin: 6px 8px; }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 20px;
      margin: 6px 12px; border-radius: 14px; transition: all 0.2s;
      color: #c4b5fd; cursor: pointer; white-space: nowrap;
    }
    .sidebar-item:hover { background: #4c1d95; color: white; transform: translateX(3px); }
    .sidebar-item.active { background: #8b5cf6; color: white; box-shadow: 0 6px 14px rgba(139,92,246,0.5); }
    .resize-handle { position: absolute; right: -5px; top: 0; width: 8px; height: 100%; cursor: ew-resize; background: transparent; z-index: 100; }
    .resize-handle:hover { background: rgba(139,92,246,0.5); }
    .toggle-sidebar-btn {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #4c1d95; border-radius: 30px; padding: 8px 12px;
      color: white; cursor: pointer; z-index: 101; font-size: 12px; white-space: nowrap;
    }
    .sidebar.collapsed .toggle-sidebar-btn { left: 35px; transform: none; writing-mode: vertical-rl; padding: 12px 6px; }
    .page { display: none; animation: fadeIn 0.35s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 8px 25px -6px rgba(0,0,0,0.1); }
    .theory-card { cursor: pointer; transition: all 0.2s; background: white; border-radius: 1rem; }
    .theory-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -8px rgba(0,0,0,0.2); }
    .detail-content { display: none; margin-top: 12px; padding: 12px; background: #f8fafc; border-radius: 1rem; border-left: 4px solid #8b5cf6; }
    .detail-content.show { display: block; animation: slideDown 0.25s; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .substance-card { background: white; border-radius: 1rem; padding: 8px 4px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0; }
    .substance-card.active { border-color: #8b5cf6; background: #f3e8ff; transform: scale(0.98); }
    .ph-gradient-bar { background: linear-gradient(to right, #b91c1c,#dc2626,#ea580c,#d97706,#ca8a04,#4d7c0f,#16a34a,#0891b2,#0284c7,#1d4ed8,#4f46e5,#7c3aed,#6d28d9,#4c1d95,#1e0050); height: 10px; border-radius: 20px; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 1rem; overflow: hidden; background: #0f172a; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .chat-message { background: #e2e8f0; border-radius: 1rem; padding: 8px 12px; margin-bottom: 8px; max-width: 85%; }
    .chat-message.user { background: #8b5cf6; color: white; margin-left: auto; }
    .menu-toggle { display: none; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; height: 100%; transform: translateX(-100%); transition: transform 0.3s ease; width: 280px !important; }
      .sidebar.mobile-open { transform: translateX(0); }
      .resize-handle, .toggle-sidebar-btn { display: none; }
      .menu-toggle { display: block; }
      .main-content { margin-left: 0 !important; width: 100%; }
    }
    .ph-scale-box { display: flex; height: 40px; border-radius: 20px; overflow: hidden; margin: 15px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .ph-segment { flex: 1; text-align: center; color: white; font-weight: bold; font-size: 12px; line-height: 40px; }
    .ion-diagram { display: flex; justify-content: center; align-items: center; gap: 20px; background: #1e293b; padding: 15px; border-radius: 20px; color: white; }
    .comp-bar-container { background: #e2e8f0; border-radius: 10px; height: 20px; width: 100%; margin: 10px 0; }
    .indicator-strip { display: flex; height: 30px; border-radius: 15px; overflow: hidden; margin: 8px 0; }
    .quiz-option { transition: all 0.15s; cursor: pointer; }
    .quiz-option:hover:not(:disabled) { background-color: #e0e7ff; }
    .badge-guru { background: linear-gradient(135deg,#f59e0b,#ef4444); }
    .badge-murid { background: linear-gradient(135deg,#06b6d4,#8b5cf6); }
  </style>
</head>
<body>

<!-- ===================== AUTH OVERLAY ===================== -->
<div id="auth-overlay">
  <!-- Floating particles -->

  <div class="auth-card">
    <!-- Logo -->

      <div style="width:60px;height:60px;background:linear-gradient(135deg,#ec4899,#8b5cf6);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>

      <div class="auth-input-group">

<script>
// ======================= AUTH SYSTEM =======================
const GURU_SECRET = 'CHEM2026';
let selectedRole = 'murid';

function getUsers() {
  const stored = localStorage.getItem('chemedu_users');
  if (!stored) {
    // Seed default accounts
    const defaults = [
      { username: 'guru_demo', password: 'guru123', nama: 'Guru Demo', role: 'guru' },
      { username: 'murid_demo', password: 'murid123', nama: 'Murid Demo', role: 'murid' }
    ];
    localStorage.setItem('chemedu_users', JSON.stringify(defaults));
    return defaults;
  }
  return JSON.parse(stored);
}

function saveUsers(users) {
  localStorage.setItem('chemedu_users', JSON.stringify(users));
}

function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  clearMessages();
}

function clearMessages() {
  ['login-error','reg-error','reg-success'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'none'; el.textContent = ''; }
  });
}

function showMsg(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function togglePwd(inputId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-murid').classList.toggle('selected', role === 'murid');
  document.getElementById('role-guru').classList.toggle('selected', role === 'guru');
  document.getElementById('guru-code-box').style.display = role === 'guru' ? 'block' : 'none';
}

function doLogin() {
  clearMessages();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showMsg('login-error', '⚠️ Isi username dan password terlebih dahulu!'); return; }
  const users = getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (!user) { showMsg('login-error', '❌ Username atau password salah. Coba lagi atau daftar akun baru.'); return; }
  currentUser = { username: user.username, nama: user.nama, role: user.role };
  document.getElementById('auth-overlay').classList.add('hidden');
  initApp();
}

function doRegister() {
  clearMessages();
  const username = document.getElementById('reg-username').value.trim();
  const nama = document.getElementById('reg-nama').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const guruCode = document.getElementById('reg-guru-code')?.value.trim();

  if (!username || !nama || !password || !confirm) { showMsg('reg-error', '⚠️ Semua kolom wajib diisi!'); return; }
  if (username.length < 4) { showMsg('reg-error', '⚠️ Username minimal 4 karakter.'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { showMsg('reg-error', '⚠️ Username hanya boleh huruf, angka, dan underscore (_).'); return; }
  if (password.length < 6) { showMsg('reg-error', '⚠️ Password minimal 6 karakter.'); return; }
  if (password !== confirm) { showMsg('reg-error', '⚠️ Konfirmasi password tidak cocok.'); return; }
  if (selectedRole === 'guru' && guruCode !== GURU_SECRET) { showMsg('reg-error', '🔒 Kode guru salah! Hubungi pengajar Anda.'); return; }

  const users = getUsers();
  if (users.find(u => u.username === username)) { showMsg('reg-error', '❌ Username sudah digunakan. Coba username lain.'); return; }

  users.push({ username, password, nama, role: selectedRole });
  saveUsers(users);
  showMsg('reg-success', `✅ Akun berhasil dibuat! Silakan masuk dengan username: ${username}`);
  document.getElementById('reg-username').value = '';
  document.getElementById('reg-nama').value = '';
  document.getElementById('reg-password').value = '';
  document.getElementById('reg-confirm').value = '';
  setTimeout(() => switchTab('login'), 1800);
}

function computePH(sub, conc) {
  if (sub.type === "strong_acid") { let h = conc * sub.valensi; if(h<=0) return 7; return Math.min(14, Math.max(0, -Math.log10(h))); }
  if (sub.type === "strong_base") { let oh = conc * sub.valensi; if(oh<=0) return 7; return 14 - (-Math.log10(oh)); }
  if (sub.type === "weak_acid" && sub.ka) { let h = Math.sqrt(sub.ka * conc); if(isNaN(h)) return 7; return -Math.log10(h); }
  if (sub.type === "weak_base" && sub.kb) { let oh = Math.sqrt(sub.kb * conc); if(isNaN(oh)) return 7; return 14 - (-Math.log10(oh)); }
  if (sub.type === "weak_acid_salt" && sub.ka) { let h = Math.sqrt(sub.ka * conc); return -Math.log10(h); }
  if (sub.id === "nahco3") { let oh = Math.sqrt(2.3e-8 * conc); return 14 - (-Math.log10(oh)); }
  if (sub.id === "na2co3") { let oh = Math.sqrt(2.1e-4 * conc); return 14 - (-Math.log10(oh)); }
  if (sub.id === "ch3coona") { let oh = Math.sqrt(5.6e-10 * conc); return 14 - (-Math.log10(oh)); }
  return 7;
}

// ========== MICRO ANIMATION ENGINE ==========
let microAnimFrame = null;
let microParticles = [];
let microContainer = null;
let microCtx = null;
let microW = 760, microH = 180;

function initMicroAnimation(container) {
  if (microAnimFrame) { cancelAnimationFrame(microAnimFrame); microAnimFrame = null; }
  const canvas = container.querySelector('#micro-canvas');
  if (!canvas) return;
  microContainer = container;
  microW = canvas.offsetWidth || 760; canvas.width = microW; microH = canvas.height;
  microCtx = canvas.getContext('2d');
  buildMicroParticles(); drawMicroFrame();
}
function buildMicroParticles() {
  if (!microContainer) return;
  const sub = currentSub; const conc = currentConc; microParticles = [];
  let alpha = 0;
  if (sub.type === 'strong_acid' || sub.type === 'strong_base') { alpha = 1.0; }
  else if ((sub.type === 'weak_acid' || sub.type === 'weak_acid_salt') && sub.ka) { alpha = Math.min(1, Math.sqrt(sub.ka / conc)); }
  else if (sub.type === 'weak_base' && sub.kb) { alpha = Math.min(1, Math.sqrt(sub.kb / conc)); }
  else if (sub.id === 'air') { alpha = Math.min(1, 1e-7 / conc); }
  else { alpha = 0.05; }
  const pct = (alpha * 100);
  const ionPctEl = microContainer.querySelector('#micro-ionpct');
  const ionBarFill = microContainer.querySelector('#micro-ionbar-fill');
  if (ionPctEl) ionPctEl.textContent = pct >= 99.5 ? '100%' : pct.toFixed(2) + '%';
  if (ionBarFill) {
    ionBarFill.style.width = Math.max(2, pct) + '%';
    if (pct >= 99) ionBarFill.style.background = 'linear-gradient(90deg,#f87171,#ef4444)';
    else if (pct > 20) ionBarFill.style.background = 'linear-gradient(90deg,#fbbf24,#a78bfa)';
    else ionBarFill.style.background = 'linear-gradient(90deg,#60a5fa,#a78bfa)';
  }
  const maxTotal = 20; const nIonized = Math.round(alpha * maxTotal); const nMolecule = maxTotal - nIonized;
  for (let i = 0; i < 28; i++) { microParticles.push({ x: Math.random()*microW, y: Math.random()*microH, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5, r:5, color:'#38bdf8', label:'', type:'water' }); }
  for (let i = 0; i < nMolecule; i++) { microParticles.push({ x: Math.random()*microW, y: Math.random()*microH, vx:(Math.random()-0.5)*0.45, vy:(Math.random()-0.5)*0.45, r:10, color:'#a78bfa', label:sub.formula||'?', type:'molecule' }); }
  const isAcid = sub.type==='strong_acid'||sub.type==='weak_acid'||sub.type==='weak_acid_salt';
  const isBase = sub.type==='strong_base'||sub.type==='weak_base';
  for (let i = 0; i < nIonized; i++) {
    if (isAcid||sub.id==='air') { microParticles.push({ x:Math.random()*microW, y:Math.random()*microH, vx:(Math.random()-0.5)*1.3, vy:(Math.random()-0.5)*1.3, r:7, color:'#f87171', label:'H⁺', type:'ion_h' }); }
    if (isBase||sub.id==='air') { microParticles.push({ x:Math.random()*microW, y:Math.random()*microH, vx:(Math.random()-0.5)*1.3, vy:(Math.random()-0.5)*1.3, r:7, color:'#34d399', label:'OH⁻', type:'ion_oh' }); }
    if (sub.type==='strong_acid') { microParticles.push({ x:Math.random()*microW, y:Math.random()*microH, vx:(Math.random()-0.5)*1.0, vy:(Math.random()-0.5)*1.0, r:7, color:'#fb923c', label:'A⁻', type:'ion_anion' }); }
    if (sub.type==='strong_base') { microParticles.push({ x:Math.random()*microW, y:Math.random()*microH, vx:(Math.random()-0.5)*1.0, vy:(Math.random()-0.5)*1.0, r:7, color:'#facc15', label:'M⁺', type:'ion_cation' }); }
  }
  const legend = microContainer.querySelector('#micro-legend');
  if (legend) {
    const items = [{ color:'#38bdf8', label:'H₂O (pelarut)' }];
    if (nMolecule > 0) items.push({ color:'#a78bfa', label:sub.formula+' (belum terionisasi)' });
    if (nIonized > 0) {
      if (isAcid||sub.id==='air') items.push({ color:'#f87171', label:'H⁺' });
      if (isBase||sub.id==='air') items.push({ color:'#34d399', label:'OH⁻' });
      if (sub.type==='strong_acid') items.push({ color:'#fb923c', label:'A⁻ (anion)' });
      if (sub.type==='strong_base') items.push({ color:'#facc15', label:'M⁺ (kation)' });
    }
    legend.innerHTML = items.map(it => `<span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:50%;background:${it.color};display:inline-block;"></span>${it.label}</span>`).join('');
  }
  const desc = microContainer.querySelector('#micro-desc');
  if (desc) {
    if (alpha >= 0.995) desc.textContent = `${sub.name} terionisasi sempurna (α=100%). Seluruh molekul menjadi ion.`;
    else if (alpha < 0.01) desc.textContent = `${sub.name} hampir tidak terionisasi (α≈0%). Dominan molekul utuh.`;
    else desc.textContent = `${sub.name} terionisasi sebagian (α=${(alpha*100).toFixed(2)}%). Ada molekul utuh dan ion.`;
  }
  // Ion journey strip
  const strip = microContainer.querySelector('#ion-journey-strip');
  if (strip) {
    const steps = 7;
    strip.innerHTML = Array.from({length: steps}, (_, i) => {
      const frac = i / (steps - 1);
      const nMol = Math.round((1 - frac) * 5);
      const nIon = Math.round(frac * 5);
      return `<div style="flex:1;min-width:64px;background:#1e293b;border-radius:10px;padding:6px 4px;text-align:center;">
        ${Array.from({length:nMol}).map(()=>'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#a78bfa;margin:1px;"></span>').join('')}
        ${Array.from({length:nIon}).map(()=>'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f87171;margin:1px;"></span>').join('')}
        <div style="color:#94a3b8;font-size:9px;margin-top:3px;">${Math.round(frac*100)}%</div>
      </div>`;
    }).join('');
  }
}
function drawMicroFrame() {
  if (!microCtx) return;
  microCtx.clearRect(0, 0, microW, microH);
  microParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < p.r) { p.x = p.r; p.vx = Math.abs(p.vx); }
    if (p.x > microW - p.r) { p.x = microW - p.r; p.vx = -Math.abs(p.vx); }
    if (p.y < p.r) { p.y = p.r; p.vy = Math.abs(p.vy); }
    if (p.y > microH - p.r) { p.y = microH - p.r; p.vy = -Math.abs(p.vy); }
    microCtx.beginPath(); microCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    microCtx.fillStyle = p.color; microCtx.fill();
    if (p.label) {
      microCtx.fillStyle = '#fff'; microCtx.font = `bold ${Math.max(6, p.r * 0.8)}px Inter,sans-serif`;
      microCtx.textAlign = 'center'; microCtx.textBaseline = 'middle';
      microCtx.fillText(p.label, p.x, p.y);
    }
  });
  microAnimFrame = requestAnimationFrame(drawMicroFrame);
}
function updateSimUI(container) {
  const ph = computePH(currentSub, currentConc);
  const phColor = getPhColor(ph);
  const phNum = container.querySelector('#ph-number');
  if (phNum) { phNum.innerText = ph.toFixed(2); phNum.style.color = phColor; }
  const status = container.querySelector('#ph-status');
  if (status) {
    let label='Netral', bg='#e2e8f0', col='#374151';
    if (ph < 7) { label=`Asam (pH ${ph.toFixed(2)})`; bg='#fee2e2'; col='#b91c1c'; }
    else if (ph > 7) { label=`Basa (pH ${ph.toFixed(2)})`; bg='#dbeafe'; col='#1d4ed8'; }
    status.innerText=label; status.style.background=bg; status.style.color=col;
  }
  const cursor = container.querySelector('#ph-cursor');
  if (cursor) cursor.style.left = ((ph/14)*100)+'%';
  const liq = container.querySelector('#liquid-fill');
  if (liq) { liq.setAttribute('fill', phColor); }
  const thermo = container.querySelector('#thermo-fill');
  if (thermo) { const h=Math.max(5, Math.min(140,(ph/14)*140)); thermo.setAttribute('y',180-h); thermo.setAttribute('height',h); thermo.setAttribute('fill', phColor); }
  const h3o = Math.pow(10, -ph);
  const oh = Math.pow(10, -(14 - ph));
  const h3oEl = container.querySelector('#h3o-val');
  const ohEl = container.querySelector('#oh-val');
  if (h3oEl) h3oEl.innerHTML = formatSci(h3o);
  if (ohEl) ohEl.innerHTML = formatSci(oh);
  const indEl = container.querySelector('#indicator-text');
  if (indEl) indEl.innerText = getIndicatorDesc(ph);
  buildMicroParticles();
}

function renderSumatifMurid(container) {
  const username = currentUser.username;
  const alreadySubmitted = studentSubmitted[username] === true;
  let savedAnswers = [];
  if (alreadySubmitted) { const scoreData = studentScores.find(s => s.username === username); if (scoreData) savedAnswers = scoreData.answers || []; }
  container.innerHTML = `<div class="glass-card p-6"><h3 class="text-xl font-bold mb-3 text-purple-800">📝 Ujian Sumatif (10 Soal)</h3><div id="quiz-area"></div>${!alreadySubmitted ? '<button id="submit-sumatif" class="mt-5 bg-purple-600 text-white px-5 py-2 rounded-xl">Kumpulkan Jawaban</button>' : '<div class="mt-4 p-3 bg-green-100 rounded-xl text-green-800">✅ Anda telah menyelesaikan sumatif. Tidak dapat mengulang.</div>'}</div>`;
  const quizArea = container.querySelector('#quiz-area');
  let studentAnswers = new Array(10).fill(null);
  function renderQuestions(answers = null) {
    quizArea.innerHTML = '';
    soalBank.forEach((q, idx) => {
      const selected = answers ? answers[idx] : null;
      const div = document.createElement('div'); div.className = "bg-white p-4 rounded-xl border mb-3 shadow-sm";
      div.innerHTML = `<div class="font-bold text-indigo-700">${idx+1}. ${q.q}</div><div class="grid grid-cols-2 gap-2 mt-2" id="q-${idx}">${q.opts.map((o,i)=>`<button class="sum-opt text-left p-2 rounded-lg border text-sm" data-q="${idx}" data-val="${i}" ${answers?'disabled':''}>${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>`;
      quizArea.appendChild(div);
      if (selected !== undefined && selected !== null) {
        const optsDiv = div.querySelector(`#q-${idx}`);
        optsDiv.querySelectorAll('button').forEach(btn => { const val=parseInt(btn.dataset.val); if(val===soalBank[idx].correct) btn.classList.add('bg-green-100'); if(val===selected&&val!==soalBank[idx].correct) btn.classList.add('bg-red-100'); });
      }
    });
    if (!answers && !alreadySubmitted) {
      document.querySelectorAll('.sum-opt').forEach(btn => {
        btn.addEventListener('click', () => { const qIdx=parseInt(btn.dataset.q); const sel=parseInt(btn.dataset.val); studentAnswers[qIdx]=sel; document.getElementById(`q-${qIdx}`).querySelectorAll('button').forEach(b=>b.classList.remove('bg-blue-100')); btn.classList.add('bg-blue-100'); });
      });
    }
  }
  if (alreadySubmitted && savedAnswers.length) renderQuestions(savedAnswers); else renderQuestions();
  const submitBtn = container.querySelector('#submit-sumatif');
  if (submitBtn && !alreadySubmitted) {
    submitBtn.addEventListener('click', () => {
      if (studentAnswers.some(a => a === null)) { alert("Jawab semua soal terlebih dahulu!"); return; }
      let score = 0; studentAnswers.forEach((ans, i) => { if (ans === soalBank[i].correct) score++; });
      studentScores.push({ username, nama: currentUser.nama, score, timestamp: new Date().toISOString(), answers: [...studentAnswers] });
      studentSubmitted[username] = true;
      localStorage.setItem('chemedu_scores', JSON.stringify(studentScores));
      localStorage.setItem('chemedu_submitted', JSON.stringify(studentSubmitted));
      alert(`Nilai Anda: ${score}/10. Jawaban telah disimpan.`);
      renderSumatifMurid(container);
    });
  }
}

  document.getElementById('send-chat')?.addEventListener('click', () => { let inp=document.getElementById('chat-input'); let txt=inp.value.trim(); if(!txt) return; addChat(txt,'user'); setTimeout(()=>{ addChat(`Silakan cek materi "Skala pH" atau "Rumus pH" untuk menjawab: "${txt}"`, 'bot'); },400); inp.value=''; });

// ========== NAVIGASI & INIT APP ==========
let menuItems = [];
function initApp() {
  const isGuru = currentUser.role === 'guru';
  menuItems = [
    { id:'petunjuk', icon:'help-circle', label:'Petunjuk', render:renderPetunjuk },
    { id:'materi', icon:'book-open', label:'Materi', render:(c)=>renderMateri(c,isGuru) },
    { id:'simulasi', icon:'flask-conical', label:'Simulasi pH', render:renderSimulasi },
    { id:'diskusi', icon:'message-square', label:'Diskusi', render:renderDiskusi },
    { id:'generatesoal', icon:'sparkles', label:'Generate Soal', render:renderGenerate },
    { id:'sumatif', icon:'clipboard-list', label:'Sumatif', render:(c)=>isGuru?renderSumatifGuru(c):renderSumatifMurid(c) },
    { id:'refleksi', icon:'heart', label:'Refleksi', render:renderRefleksi },
    { id:'webdev', icon:'code', label:'Web Development', render:renderWebDev }
  ];
  const sidebarMenu = document.getElementById('sidebar-menu');
  sidebarMenu.innerHTML = '';
  menuItems.forEach(item => {
    const div = document.createElement('div'); div.className='sidebar-item'; div.dataset.page=item.id;
    div.innerHTML=`<i data-lucide="${item.icon}" class="w-5 h-5"></i><span>${item.label}</span>`;
    div.onclick = () => {
      document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); div.classList.add('active');
      document.getElementById('page-title').innerText = item.label;
      if (microAnimFrame) { cancelAnimationFrame(microAnimFrame); microAnimFrame=null; }
      item.render(document.getElementById('page-content'));
      lucide.createIcons();
      if (item.id==='simulasi'&&simContainer) setTimeout(()=>updateSimUI(simContainer),50);
      autoCollapseSidebar();
    };
    sidebarMenu.appendChild(div);
  });
  // Badge role
  const badge = document.getElementById('role-badge');
  if (badge) {
    badge.textContent = isGuru ? '👨‍🏫 Guru' : '👩‍🎓 Murid';
    badge.className = `text-xs px-3 py-1 rounded-full font-semibold text-white ${isGuru ? 'badge-guru' : 'badge-murid'}`;
  }
  document.getElementById('user-info').innerHTML = `<div class="user-info-text">👤 ${currentUser.nama||currentUser.username}</div><div class="user-info-text text-violet-500 text-[10px]">${currentUser.role}</div>`;
  document.querySelector('.sidebar-item').click();
  lucide.createIcons();
}

document.getElementById('menuToggle')?.addEventListener('click', () => sidebar.classList.toggle('mobile-open'));
document.getElementById('logout-btn')?.addEventListener('click', () => {
  currentUser = null;
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('page-content').innerHTML = '';
  document.getElementById('sidebar-menu').innerHTML = '';
  document.getElementById('user-info').innerHTML = '';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  clearMessages();
});

window.toggleDetail = (id) => { const el=document.getElementById(id); if(el) el.classList.toggle('show'); };
